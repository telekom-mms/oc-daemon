# test network with ipv4 only
name: oc-daemon-test

services:
  ocserv:
    build:
      context: ../../../
      dockerfile: test/ocserv/podman/Dockerfile
      target: ocserv
    cap_add:
      - NET_ADMIN
      - NET_RAW # for ping
    devices:
      - "/dev/net/tun:/dev/net/tun"
    networks:
      - ext
      - int
    container_name: oc-daemon-test-ocserv
  oc-daemon:
    build:
      context: ../../../
      dockerfile: test/ocserv/podman/Dockerfile
      target: oc-daemon
    cap_add:
      - NET_ADMIN
      - NET_RAW
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
    devices:
      - "/dev/net/tun:/dev/net/tun"
    networks:
      - ext-portal
    container_name: oc-daemon-test-oc-daemon
    environment:
      - GOCOVERDIR=/gocover
  portal:
    #image: docker.io/library/debian:12-slim
    build:
      context: ../../../
      dockerfile: test/ocserv/podman/Dockerfile
      target: web-portal
    cap_add:
      - NET_ADMIN
    networks:
      - ext-portal
      - ext
    container_name: oc-daemon-test-portal
  web-conncheck:
    build:
      context: ../../../
      dockerfile: test/ocserv/podman/Dockerfile
      target: web-conncheck
    cap_add:
      - NET_ADMIN
    networks:
      - ext
    container_name: oc-daemon-test-conncheck
    #command: [ "tail", "-f", "/dev/null" ]
  #web-portal:
  #  networks:
  #    - ext-portal
  #  container_name: oc-daemon-test-web-portal
  web-ext:
    build:
      context: ../../../
      dockerfile: test/ocserv/podman/Dockerfile
      target: web-ext
    networks:
      - ext
    container_name: oc-daemon-test-web-ext
  web-int:
    build:
      context: ../../../
      dockerfile: test/ocserv/podman/Dockerfile
      target: web-int
    cap_add:
      - NET_ADMIN
    networks:
      - int
    container_name: oc-daemon-test-web-int

networks:
  ext-portal:
    internal: true
    name: oc-daemon-test-ext-portal
  ext:
    internal: true
    name: oc-daemon-test-ext
  int:
    internal: true
    name: oc-daemon-test-int
